name: Retrain models (Supabase + W&B + Render)

on:
  workflow_dispatch:
  # Uncomment to retrain on a schedule (uses Actions minutes + W&B storage):
  # schedule:
  #   - cron: "0 6 * * 0"

concurrency:
  group: retrain-model
  cancel-in-progress: true

jobs:
  retrain:
    runs-on: ubuntu-latest
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      WANDB_PROJECT: ${{ vars.WANDB_PROJECT }}
      WANDB_ENTITY: ${{ vars.WANDB_ENTITY }}
      WANDB_MODEL_ARTIFACT: ${{ vars.WANDB_MODEL_ARTIFACT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/api/requirements.txt

      - name: Run training and register production artifact
        working-directory: backend/api
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          if [ -z "${WANDB_API_KEY}" ]; then
            echo "Missing secret WANDB_API_KEY"
            exit 1
          fi
          if [ -z "${DATABASE_URL}" ]; then
            echo "Missing secret SUPABASE_DATABASE_URL (Session pooler URL to Postgres)"
            exit 1
          fi
          python train.py --from-db --force

      - name: Redeploy API on Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK}" ]; then
            echo "RENDER_DEPLOY_HOOK_API not set; skipping deploy"
            exit 0
          fi
          curl -fsSL -X POST "${RENDER_DEPLOY_HOOK}"
