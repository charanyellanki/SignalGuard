name: Build, push, deploy (Render + GHCR)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase GHCR owner (Docker requires lowercase)
        id: meta
        shell: bash
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "ghcr_owner_lc=${owner_lc}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.ghcr_owner_lc }}/signalguard-api:${{ env.IMAGE_TAG }}
            ghcr.io/${{ steps.meta.outputs.ghcr_owner_lc }}/signalguard-api:latest

      - name: Build & push detection-service
        uses: docker/build-push-action@v6
        with:
          context: ./detection-service
          file: ./detection-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.ghcr_owner_lc }}/signalguard-detection-service:${{ env.IMAGE_TAG }}
            ghcr.io/${{ steps.meta.outputs.ghcr_owner_lc }}/signalguard-detection-service:latest

      - name: Build & push device-simulator
        uses: docker/build-push-action@v6
        with:
          context: ./device-simulator
          file: ./device-simulator/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.ghcr_owner_lc }}/signalguard-device-simulator:${{ env.IMAGE_TAG }}
            ghcr.io/${{ steps.meta.outputs.ghcr_owner_lc }}/signalguard-device-simulator:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.PUBLIC_API_URL }}
            VITE_WS_URL=${{ secrets.PUBLIC_WS_URL }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.ghcr_owner_lc }}/signalguard-frontend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ steps.meta.outputs.ghcr_owner_lc }}/signalguard-frontend:latest

      - name: Trigger Render deploy (api)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_API != '' }}
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

      - name: Trigger Render deploy (detector worker)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_DETECTOR != '' }}
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_DETECTOR }}"

      - name: Trigger Render deploy (simulator worker)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_SIMULATOR != '' }}
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_SIMULATOR }}"
