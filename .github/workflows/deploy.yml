name: Build, push, deploy (Render + GHCR)

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: "Build/push API image and trigger Render deploy hook (useful for testing)"
        type: boolean
        default: false
      skip_render:
        description: "Only build/push image to GHCR; do not call Render deploy hook"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  actions: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            workflows:
              - '.github/workflows/**'
            api:
              - 'backend/api/**'

      - name: Compute lowercase GHCR owner (Docker requires lowercase)
        id: meta
        shell: bash
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "ghcr_owner_lc=${owner_lc}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Single unified image: FastAPI + embedded detector + embedded simulator
      - name: Build & push signalguard-api
        if: |
          (github.event_name == 'workflow_dispatch' && inputs.rebuild_all == 'true') ||
          steps.changes.outputs.api == 'true' ||
          steps.changes.outputs.workflows == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend/api
          file: ./backend/api/Dockerfile
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ steps.meta.outputs.ghcr_owner_lc }}/signalguard-api:${{ env.IMAGE_TAG }}
            ghcr.io/${{ steps.meta.outputs.ghcr_owner_lc }}/signalguard-api:latest

      - name: Trigger Render deploy (api)
        if: |
          (github.event_name != 'workflow_dispatch' || inputs.skip_render != 'true') &&
          (
            (github.event_name == 'workflow_dispatch' && inputs.rebuild_all == 'true') ||
            steps.changes.outputs.api == 'true' ||
            steps.changes.outputs.workflows == 'true'
          )
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK}" ]; then
            echo "RENDER_DEPLOY_HOOK_API not set; skipping"
            exit 0
          fi
          curl -fsSL -X POST "${RENDER_DEPLOY_HOOK}"
