# Production-ish compose for a single VM.
#
# Images are pre-built in GHCR (unified `signalguard-api` — REST + ML + sim).
# Optional: set WANDB_API_KEY and WANDB_PROJECT so the API downloads models
# on boot instead of bootstrapping tiny synthetic ones.

services:
  postgres:
    image: postgres:16
    container_name: signalguard-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signalguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-signalguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signalguard} -d ${POSTGRES_DB:-signalguard}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  api:
    image: ghcr.io/${GHCR_OWNER}/signalguard-api:${IMAGE_TAG}
    container_name: signalguard-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-signalguard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-signalguard}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SIMULATOR_ENABLED: ${SIMULATOR_ENABLED:-true}
      DEVICE_COUNT: ${DEVICE_COUNT:-50}
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      WANDB_PROJECT: ${WANDB_PROJECT:-signalguard}
      WANDB_ENTITY: ${WANDB_ENTITY:-}
      WANDB_MODEL_ARTIFACT: ${WANDB_MODEL_ARTIFACT:-signalguard-models}
      WANDB_MODEL_ALIAS: ${WANDB_MODEL_ALIAS:-production}
      REQUIRE_WANDB_MODEL: ${REQUIRE_WANDB_MODEL:-false}
      ALLOW_BOOTSTRAP_TRAIN: ${ALLOW_BOOTSTRAP_TRAIN:-true}
      MODEL_DIR: /app/models/trained
    volumes:
      - api_models:/app/models/trained
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GHCR_OWNER}/signalguard-frontend:${IMAGE_TAG}
    container_name: signalguard-frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  api_models:
