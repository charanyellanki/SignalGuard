services:
  postgres:
    image: postgres:16
    container_name: signalguard-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signalguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signalguard}
      POSTGRES_DB: ${POSTGRES_DB:-signalguard}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signalguard} -d ${POSTGRES_DB:-signalguard}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: signalguard-kafka
    ports:
      - "${KAFKA_HOST_PORT:-29092}:29092"
    environment:
      # KRaft mode (no Zookeeper) — single-node broker+controller.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  device-simulator:
    build: ./device-simulator
    container_name: signalguard-simulator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-device-telemetry}
      DEVICE_COUNT: ${DEVICE_COUNT:-500}
      EMIT_INTERVAL_SEC: ${EMIT_INTERVAL_SEC:-5}
      ANOMALY_PROBABILITY: ${ANOMALY_PROBABILITY:-0.02}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  detection-service:
    build: ./detection-service
    container_name: signalguard-detector
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-device-telemetry}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-detection-service}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-signalguard}:${POSTGRES_PASSWORD:-signalguard}@postgres:5432/${POSTGRES_DB:-signalguard}
      ENABLE_ISOLATION_FOREST: ${ENABLE_ISOLATION_FOREST:-true}
      ENABLE_LSTM_AUTOENCODER: ${ENABLE_LSTM_AUTOENCODER:-true}
      MODEL_DIR: /app/models/trained
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - detection_models:/app/models/trained
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: ./api
    container_name: signalguard-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-signalguard}:${POSTGRES_PASSWORD:-signalguard}@postgres:5432/${POSTGRES_DB:-signalguard}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-signalguard}:${POSTGRES_PASSWORD:-signalguard}@postgres:5432/${POSTGRES_DB:-signalguard}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: signalguard-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  detection_models:
