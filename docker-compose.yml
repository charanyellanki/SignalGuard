services:
  postgres:
    image: postgres:16
    container_name: signalguard-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signalguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signalguard}
      POSTGRES_DB: ${POSTGRES_DB:-signalguard}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signalguard} -d ${POSTGRES_DB:-signalguard}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  api:
    build: ./backend/api
    container_name: signalguard-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      # Pin in-container listen port to match the right-hand side of `ports:` below.
      # (On Render, the platform sets PORT; do not set this in the Render UI.)
      PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-signalguard}:${POSTGRES_PASSWORD:-signalguard}@postgres:5432/${POSTGRES_DB:-signalguard}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Embedded simulator (replaces the old device-simulator service)
      SIMULATOR_ENABLED: "true"
      DEVICE_COUNT: ${DEVICE_COUNT:-50}
      EMIT_INTERVAL_SEC: ${EMIT_INTERVAL_SEC:-5}
      ANOMALY_PROBABILITY: ${ANOMALY_PROBABILITY:-0.02}
      # First boot: train small synthetic models on disk (no W&B required locally)
      ALLOW_BOOTSTRAP_TRAIN: "true"
      REQUIRE_WANDB_MODEL: "false"
      MODEL_DIR: /app/models/trained
    volumes:
      - api_models:/app/models/trained
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: signalguard-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./frontend/package.json

volumes:
  postgres_data:
  api_models:
